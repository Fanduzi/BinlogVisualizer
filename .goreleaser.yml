# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# input: git tags, module source tree, and native CGO-capable build environments for supported release platforms.
# output: a single source of truth for release artifact naming and native-target build settings used by the release workflow and local static validation.
# pos: release packaging contract that keeps GoReleaser, the GitHub workflow, and install docs aligned without changing runtime behavior.
# note: CI native runners are the only trusted multi-platform release path for this DuckDB/CGO project; local goreleaser usage is limited to check/single-target validation.
version: 2

project_name: binlogviz

before:
  hooks:
    - go test ./...

builds:
  - id: binlogviz
    binary: binlogviz
    main: .
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: release-archive
    ids:
      - binlogviz
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  disable: true
