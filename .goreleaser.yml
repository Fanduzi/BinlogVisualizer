# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# input: git tags, module source tree, and native CGO-capable build environments for supported release platforms.
# output: GitHub-release-ready tar.gz archives plus a checksums manifest for darwin/linux amd64/arm64.
# pos: release packaging configuration that standardizes artifact naming and checksum generation without changing product behavior.
# note: if this file changes, update README.md and workflow docs to keep packaging guidance aligned.
version: 2

project_name: binlogviz

before:
  hooks:
    - go test ./...

builds:
  - id: binlogviz
    binary: binlogviz
    main: .
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: release-archive
    ids:
      - binlogviz
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  disable: true

release:
  github:
    owner: Fanduzi
    name: BinlogVisualizer
